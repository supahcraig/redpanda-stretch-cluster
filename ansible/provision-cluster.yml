---
# Provisions a stretch Redpanda cluster across multiple regions.
# Run after `terraform apply` has generated ansible/hosts.ini.
#
# Usage:
#   ansible-playbook ansible/provision-cluster.yml --private-key ~/.ssh/id_rsa
#
- name: Provision stretch Redpanda cluster
  hosts: redpanda
  become: true
  tasks:
    # ── System prereqs & sysctl ───────────────────────────────────────────────
    - name: Install system prerequisites
      ansible.builtin.include_role:
        name: redpanda.cluster.system_setup

    - name: Apply sysctl settings
      ansible.builtin.include_role:
        name: redpanda.cluster.sysctl_setup

    # system_setup installs the redpanda package (creating the redpanda user)
    # and mounts NVMe at /mnt/vectorized. Ensure the data directory is owned
    # by the redpanda user before the broker role tries to write to it.
    - name: Ensure redpanda owns the data directory
      ansible.builtin.file:
        path: /var/lib/redpanda/data
        state: directory
        mode: "0755"
        owner: redpanda
        group: redpanda
        recurse: true

    # ── Build seed list from inventory ───────────────────────────────────────
    # Private IPs are reachable cross-region via VPC peering.
    - name: Collect broker private IPs for seeds
      ansible.builtin.set_fact:
        _broker_seeds: >-
          {{
            groups['redpanda']
            | map('extract', hostvars, 'private_ip')
            | list
          }}

    # ── Redpanda broker install ───────────────────────────────────────────────
    - name: Install and start Redpanda
      ansible.builtin.include_role:
        name: redpanda.cluster.redpanda_broker
      vars:
        # redpanda_version and rack come from hosts.ini (per-host and [all:vars])
        # node.redpanda.advertised_kafka_api overrides the role's default (private IP)
        # with the public IP so external producers can reach this broker.
        # Cluster-wide settings are applied separately below via rpk to avoid the
        # role's no_log black box.
        _redpanda_config:
          node:
            redpanda:
              advertised_kafka_api:
                - address: "{{ ansible_host }}"
                  port: 9092
        redpanda: "{{ _redpanda_config | to_json }}"
      when: not skip_node | default(false) | bool

    # ── Cluster-wide config ───────────────────────────────────────────────────
    # Set via rpk directly so failures are visible (role uses no_log).
    # run_once applies the change through one broker; it propagates to all.
    - name: Set default_topic_replications
      ansible.builtin.command: rpk cluster config set default_topic_replications 5
      run_once: true
      changed_when: "'New configuration version' in result.stdout"
      register: result

    - name: Set internal_topic_replication_factor
      ansible.builtin.command: rpk cluster config set internal_topic_replication_factor 5
      run_once: true
      changed_when: "'New configuration version' in result2.stdout"
      register: result2

# ── Redpanda Console ──────────────────────────────────────────────────────────
# Console is installed via the redpanda_broker role with install_console: true.
# The role installs the redpanda-console package (from the Redpanda apt repo),
# writes /etc/redpanda/redpanda-console-config.yaml, and starts the service.
- name: Install Redpanda Console
  hosts: console
  become: true
  tasks:
    - name: Install system prerequisites
      ansible.builtin.include_role:
        name: redpanda.cluster.system_setup

    - name: Install and configure Redpanda Console
      ansible.builtin.include_role:
        name: redpanda.cluster.redpanda_broker
      vars:
        install_console: true
        # console_kafka_brokers from [all:vars] in hosts.ini:
        # comma-separated private_ip:9092 pairs for all brokers
        rpconsole: "{{ {'kafka': {'brokers': console_kafka_brokers.split(',')}} | to_json }}"
